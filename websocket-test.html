<!doctype html>
<html>
  <head>
    <title>WebSocket Chat Test</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 20px auto;
        padding: 0 20px;
      }
      .section {
        background: #f5f5f5;
        padding: 15px;
        margin: 10px 0;
        border-radius: 8px;
      }
      .log {
        background: #1e1e1e;
        color: #0f0;
        padding: 10px;
        height: 300px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 12px;
      }
      input,
      button {
        padding: 10px;
        margin: 5px;
      }
      button {
        cursor: pointer;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
      }
      button:hover {
        background: #0056b3;
      }
      .connected {
        color: green;
      }
      .disconnected {
        color: red;
      }
      #messageInput {
        width: 70%;
      }
    </style>
  </head>
  <body>
    <h1>🔌 WebSocket Chat Test</h1>

    <div class="section">
      <h3>1. Login</h3>
      <input
        type="email"
        id="email"
        value="test@baotienweb.com"
        placeholder="Email"
      />
      <input
        type="password"
        id="password"
        value="Test@123456"
        placeholder="Password"
      />
      <button onclick="login()">Login</button>
      <span id="loginStatus"></span>
    </div>

    <div class="section">
      <h3>2. WebSocket Connection</h3>
      <button onclick="connectWS()">Connect WebSocket</button>
      <button onclick="disconnectWS()">Disconnect</button>
      <span id="wsStatus" class="disconnected">⚫ Disconnected</span>
    </div>

    <div class="section">
      <h3>3. Join Conversation</h3>
      <input
        type="text"
        id="conversationId"
        value="774ff2b8-0a55-46b7-befa-c636e467ebce"
        placeholder="Conversation ID"
        style="width: 350px"
      />
      <button onclick="joinConversation()">Join</button>
      <button onclick="leaveConversation()">Leave</button>
    </div>

    <div class="section">
      <h3>4. Send Message</h3>
      <input type="text" id="messageInput" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
      <button onclick="startTyping()">Start Typing</button>
      <button onclick="stopTyping()">Stop Typing</button>
    </div>

    <div class="section">
      <h3>Event Log</h3>
      <div id="log" class="log"></div>
      <button onclick="clearLog()">Clear Log</button>
    </div>

    <script>
      const API_BASE = "https://baotienweb.cloud/api";
      const WS_URL = "https://baotienweb.cloud";
      const API_KEY = "baotienweb-api-key-2025";

      let token = null;
      let socket = null;
      let currentConversationId = null;

      function log(msg, type = "info") {
        const logEl = document.getElementById("log");
        const time = new Date().toLocaleTimeString();
        const colors = {
          info: "#0f0",
          error: "#f00",
          send: "#ff0",
          receive: "#0ff",
        };
        logEl.innerHTML += `<span style="color:${colors[type]}">[${time}] ${msg}</span>\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      function clearLog() {
        document.getElementById("log").innerHTML = "";
      }

      async function login() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
          const res = await fetch(`${API_BASE}/auth/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": API_KEY,
            },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();

          if (data.accessToken) {
            token = data.accessToken;
            document.getElementById("loginStatus").innerHTML =
              "✅ Logged in as " + data.user.name;
            log("Login successful! Token: " + token.substring(0, 30) + "...");
          } else {
            document.getElementById("loginStatus").innerHTML =
              "❌ Login failed";
            log("Login failed: " + JSON.stringify(data), "error");
          }
        } catch (err) {
          log("Login error: " + err.message, "error");
        }
      }

      function connectWS() {
        if (!token) {
          log("Please login first!", "error");
          return;
        }

        log("Connecting to WebSocket...");

        socket = io(WS_URL + "/conversations", {
          auth: { token },
          transports: ["websocket", "polling"],
          reconnection: true,
        });

        socket.on("connect", () => {
          document.getElementById("wsStatus").innerHTML = "🟢 Connected";
          document.getElementById("wsStatus").className = "connected";
          log("WebSocket connected! Socket ID: " + socket.id);
        });

        socket.on("disconnect", (reason) => {
          document.getElementById("wsStatus").innerHTML = "⚫ Disconnected";
          document.getElementById("wsStatus").className = "disconnected";
          log("WebSocket disconnected: " + reason, "error");
        });

        socket.on("connect_error", (err) => {
          log("Connection error: " + err.message, "error");
        });

        // Message events
        socket.on("message.new", (data) => {
          log("📩 NEW MESSAGE: " + JSON.stringify(data, null, 2), "receive");
        });

        socket.on("message.ack", (data) => {
          log("✅ MESSAGE ACK: " + JSON.stringify(data), "receive");
        });

        socket.on("message.updated", (data) => {
          log("✏️ MESSAGE UPDATED: " + JSON.stringify(data), "receive");
        });

        socket.on("message.deleted", (data) => {
          log("🗑️ MESSAGE DELETED: " + JSON.stringify(data), "receive");
        });

        // Typing events
        socket.on("typing", (data) => {
          log("⌨️ TYPING: " + JSON.stringify(data), "receive");
        });

        // Presence events
        socket.on("presence", (data) => {
          log("👤 PRESENCE: " + JSON.stringify(data), "receive");
        });

        // Read receipts
        socket.on("read.receipt", (data) => {
          log("👁️ READ RECEIPT: " + JSON.stringify(data), "receive");
        });

        // Error events
        socket.on("error", (data) => {
          log("❌ ERROR: " + JSON.stringify(data), "error");
        });
      }

      function disconnectWS() {
        if (socket) {
          socket.disconnect();
          socket = null;
          log("Disconnected from WebSocket");
        }
      }

      function joinConversation() {
        if (!socket) {
          log("Connect WebSocket first!", "error");
          return;
        }

        currentConversationId = document.getElementById("conversationId").value;
        socket.emit("conversation.join", {
          conversationId: currentConversationId,
        });
        log("Joining conversation: " + currentConversationId, "send");
      }

      function leaveConversation() {
        if (!socket || !currentConversationId) return;

        socket.emit("conversation.leave", {
          conversationId: currentConversationId,
        });
        log("Leaving conversation: " + currentConversationId, "send");
        currentConversationId = null;
      }

      function sendMessage() {
        if (!socket || !currentConversationId) {
          log("Join a conversation first!", "error");
          return;
        }

        const content = document.getElementById("messageInput").value;
        if (!content) return;

        const payload = {
          conversationId: currentConversationId,
          clientMessageId: crypto.randomUUID(),
          type: "TEXT",
          content: content,
        };

        socket.emit("message.send", payload);
        log("📤 SENDING: " + JSON.stringify(payload), "send");
        document.getElementById("messageInput").value = "";
      }

      function startTyping() {
        if (!socket || !currentConversationId) return;
        socket.emit("typing.start", { conversationId: currentConversationId });
        log("Started typing...", "send");
      }

      function stopTyping() {
        if (!socket || !currentConversationId) return;
        socket.emit("typing.stop", { conversationId: currentConversationId });
        log("Stopped typing", "send");
      }

      // Enter key to send
      document.addEventListener("DOMContentLoaded", () => {
        document
          .getElementById("messageInput")
          .addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
          });
      });
    </script>
  </body>
</html>
