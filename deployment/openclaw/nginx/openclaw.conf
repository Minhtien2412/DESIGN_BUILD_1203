# Nginx reverse proxy config for OpenClaw Gateway
# Location: /etc/nginx/sites-available/openclaw
#
# Requirements:
#   - DNS A record: openclaw.baotienweb.cloud → 103.200.20.100
#   - OpenClaw Gateway running on 127.0.0.1:18789
#   - SSL via certbot after initial setup
#
# Install:
#   cp /opt/openclaw/nginx/openclaw.conf /etc/nginx/sites-available/openclaw
#   ln -s /etc/nginx/sites-available/openclaw /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d openclaw.baotienweb.cloud

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=openclaw_limit:10m rate=30r/s;

upstream openclaw_gateway {
    server 127.0.0.1:18789;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name openclaw.baotienweb.cloud;

    # Certbot will add HTTPS redirect here
    # For initial test, proxy pass on HTTP first:

    location / {
        # Rate limiting
        limit_req zone=openclaw_limit burst=50 nodelay;

        # Standard proxy headers — overwrite, do not append
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket support (required for OpenClaw control plane)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts — generous for long-running AI operations
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffering — disable for streaming
        proxy_buffering off;
        proxy_request_buffering off;

        # Max body size for file uploads
        client_max_body_size 100m;

        proxy_pass http://openclaw_gateway;
    }

    # Health check endpoint — no rate limit, no auth
    location = /healthz {
        proxy_pass http://openclaw_gateway/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        access_log off;
    }

    location = /readyz {
        proxy_pass http://openclaw_gateway/readyz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logs
    access_log /var/log/nginx/openclaw-access.log;
    error_log /var/log/nginx/openclaw-error.log warn;
}
