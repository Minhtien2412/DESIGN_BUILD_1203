server {
    listen 80;
    listen [::]:80;
    server_name app.baotienweb.cloud;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.baotienweb.cloud;

    ssl_certificate /etc/letsencrypt/live/app.baotienweb.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.baotienweb.cloud/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    root /var/www/app.baotienweb.cloud;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location /_expo {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
