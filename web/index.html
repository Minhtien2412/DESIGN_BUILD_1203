<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>ThietKeResort - APP DESIGN BUILD</title>
    
    <!-- Prevent fontfaceobserver timeout by loading system fonts -->
    <style>
      /* System font stack - no custom font loading needed */
      body, html {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 
                     'Helvetica Neue', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Disable font face observer completely */
      * {
        font-display: swap;
      }
      
      /* Loading indicator */
      #root-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #ffffff;
      }
      
      #root-loading.hidden {
        display: none;
      }
    </style>
    
    <!-- Disable fontfaceobserver globally -->
    <script>
      // Override FontFaceObserver to prevent it from ever running
      window.FontFaceObserver = function() {
        return {
          load: function() {
            return Promise.resolve();
          },
          check: function() {
            return true;
          }
        };
      };
    </script>
  </head>
  <body>
    <div id="root-loading">
      <div>
        <svg width="40" height="40" viewBox="0 0 40 40" style="animation: spin 1s linear infinite;">
          <circle cx="20" cy="20" r="15" fill="none" stroke="#4A90E2" stroke-width="4" 
                  stroke-dasharray="70" stroke-dashoffset="0" />
        </svg>
        <p style="margin-top: 16px; color: #666; font-size: 14px;">Đang tải...</p>
      </div>
    </div>
    
    <noscript>Bạn cần bật JavaScript để chạy ứng dụng này.</noscript>
    
    <div id="root"></div>
    
    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
    
    <script>
      // Hide loading when app mounts
      setTimeout(function() {
        var loading = document.getElementById('root-loading');
        if (loading) loading.className = 'hidden';
      }, 100);
    </script>
  </body>
</html>
