<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn đặt lịch của tôi – Vua Thợ</title>
    <script src="JS/workerService.js"></script>
    <script src="JS/bookingService.js"></script>
    <link rel="stylesheet" href="CSS/vuatho.css">
</head>

<body>
    <!-- Notification -->
    <section id="message" class="message"></section>

    <!-- Navbar -->
    <nav class="nav-bar">
        <div class="container">
            <a href="home.html" class="nav-logo">
                <div>
                    <div class="nav-logo-text">👑 Vua Thợ</div>
                    <div class="nav-logo-sub">Đặt thợ uy tín – Nhanh chóng</div>
                </div>
            </a>
            <div class="nav-links">
                <a href="home.html">Trang chủ</a>
                <a href="workers.html" class="nav-hide-mobile">Tìm thợ</a>
                <a href="bookings.html" class="active">
                    Đơn của tôi
                    <span id="nav-booking-count" class="nav-booking-count" style="display:none">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1 class="page-header-title">📋 Đơn đặt lịch của tôi</h1>
            <div class="page-header-breadcrumb">
                <a href="home.html">Trang chủ</a> / Đơn đặt lịch
            </div>
        </div>
    </div>

    <main>
        <div class="container" style="padding: 30px 15px;">
            <div id="bookings-container"></div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom">
                © 2024 Vua Thợ. Bảo lưu mọi quyền.
            </div>
        </div>
    </footer>

    <script>
        function updateBookingBadge() {
            var count = BookingService().count();
            var badge = document.getElementById('nav-booking-count');
            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'inline-flex';
            } else {
                badge.style.display = 'none';
            }
        }

        function displayBookings() {
            var bookings = BookingService().getAll();
            var html = BookingService().toHtmlItems(bookings);
            document.getElementById('bookings-container').innerHTML = html;
        }

        function cancelBooking(bookingId) {
            if (!confirm('Bạn có chắc muốn hủy đơn này không?')) return;
            BookingService().remove(bookingId);
            displayBookings();
            updateBookingBadge();
            var node = document.getElementById('message');
            node.style.display = 'block';
            node.innerHTML = '🗑 Đã hủy đơn đặt lịch';
            setTimeout(function() { node.style.display = 'none'; }, 2500);
        }

        // Init
        displayBookings();
        updateBookingBadge();
    </script>
</body>

</html>
